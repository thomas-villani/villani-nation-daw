name: Deploy to GitHub Pages

# Build the Vite app and publish it to GitHub Pages on every push to main.
# One-time setup: in the repo, Settings -> Pages -> "Build and deployment" ->
# Source: "GitHub Actions". After that this workflow does the rest.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-deploy by hand from the Actions tab

# Permissions the official Pages actions need to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # tsc -b && vite build -> ./dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
